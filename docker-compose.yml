version: "3.9"

services:
  app:
    build: .
    container_name: smart-cart-app
    ports:
      - "8080:8080"
    depends_on:
      - db
      - cache
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: smartcart
      DB_USER: user
      DB_PASSWORD: password
      REDIS_HOST: cache
      REDIS_PORT: 6379
    networks:
      - backend

  db:
    image: postgres:15-alpine
    container_name: smart-cart-db
    restart: always
    environment:
      POSTGRES_DB: smartcart
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  cache:
    image: redis:7-alpine
    container_name: smart-cart-redis
    restart: always
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge