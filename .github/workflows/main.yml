name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install goimports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install pre-commit
        run: python3 -m pip install --upgrade pip pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  security-gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run gosec (SAST)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

  security-semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep scan
        run: semgrep --config auto ./internal

  security-sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Run Trivy filesystem scan (table)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          output: "trivy-fs-report.txt"

      - name: Run Trivy filesystem scan (JSON)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "json"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          output: "artifacts/trivy-fs-report.json"

      - name: Upload Trivy FS report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: artifacts/trivy-fs-report.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Clear Go module cache
        run: go clean -modcache

      - name: Tidy Go modules
        run: go mod tidy

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (SCA)
        run: govulncheck ./internal/...

  sbom-generation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: "."
          format: "cyclonedx-json"
          output-file: "artifacts/sbom.json"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: artifacts/sbom.json

  security-gate:
    runs-on: ubuntu-latest
    needs: [security-gosec, security-semgrep, security-sca ,sbom-generation]
    steps:
      - name: Check security status
        run: |
          if [ "${{ needs.security-gosec.result }}" = "failure" ] || \
             [ "${{ needs.security-semgrep.result }}" = "failure" ] || \
             [ "${{ needs.security-sca.result }}" = "failure" ]; then
            echo "❌ Critical vulnerabilities found!"
            exit 1
          fi
          echo "✅ Security checks passed!"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [1.23, 1.24, 1.25]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Generate dev TLS certs
        run: |
          mkdir -p certs
          rm -f certs/server-dev.crt certs/server-dev.key
          openssl req -x509 -newkey rsa:4096 -keyout certs/server-dev.key -out certs/server-dev.crt -days 1 -nodes -subj "/CN=localhost"

      - name: Run unit tests
        run: go test ./... -v

  docker:
    runs-on: ubuntu-latest
    needs: [security-gate, lint, test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: igor-maicovich
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx builder
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver: docker-container

      - name: Restore Buildx cache
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ github.sha }}
          restore-keys: |
            buildx-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/igor-maicovich/smart-cart:latest
          cache-from: type=registry,ref=ghcr.io/igor-maicovich/smart-cart:cache
          cache-to: type=registry,ref=ghcr.io/igor-maicovich/smart-cart:cache,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          target: final

  docker-image-scan:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan Docker image with Trivy (table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/igor-maicovich/smart-cart:latest
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          output: "trivy-image-report.txt"

      - name: Scan Docker image with Trivy (JSON)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/igor-maicovich/smart-cart:latest
          format: "json"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          output: "artifacts/trivy-image-report.json"

      - name: Upload Trivy JSON report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: artifacts/trivy-image-report.json

  notify:
    runs-on: ubuntu-latest
    needs: [docker]
    if: always()
    steps:
      - name: Send Telegram Notification
        run: |
          STATUS="✅ All checks passed"
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            STATUS="❌ CI failed"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="CI Pipeline: ${STATUS}"