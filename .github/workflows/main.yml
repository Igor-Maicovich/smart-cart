name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: go-mod-

      - name: Install goimports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install pre-commit
        run: python3 -m pip install --upgrade pip pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [1.23, 1.24, 1.25]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-mod-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-mod-

      - name: Generate dev TLS certs
        run: |
          mkdir -p certs
          rm -f certs/server-dev.crt certs/server-dev.key
          openssl req -x509 -newkey rsa:4096 -keyout certs/server-dev.key -out certs/server-dev.crt -days 1 -nodes -subj "/CN=localhost"

      - name: Run unit tests
        run: go test ./... -v

  security:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [gosec, semgrep, govulncheck]

    steps:
      - uses: actions/checkout@v4

      - name: Set up environment
        run: |
          # Go для gosec и govulncheck
          if [[ "${{ matrix.tool }}" == "gosec" || "${{ matrix.tool }}" == "govulncheck" ]]; then
            echo "Setting up Go 1.25"
            sudo apt-get update
            sudo apt-get install -y golang-go
          fi
          # Python для semgrep
          if [[ "${{ matrix.tool }}" == "semgrep" ]]; then
            echo "Setting up Python 3.11"
            python3 --version || sudo apt-get install -y python3 python3-pip
          fi

      - name: Run ${{ matrix.tool }}
        shell: bash
        run: |
          if [[ "${{ matrix.tool }}" == "gosec" ]]; then
            go install github.com/securego/gosec/v2/cmd/gosec@latest
            echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
            gosec ./...
          elif [[ "${{ matrix.tool }}" == "govulncheck" ]]; then
            go install golang.org/x/vuln/cmd/govulncheck@latest
            echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
            go clean -modcache
            go mod tidy
            govulncheck ./internal/...
          elif [[ "${{ matrix.tool }}" == "semgrep" ]]; then
            python3 -m pip install --upgrade pip
            pip install semgrep
            semgrep --config auto ./internal
          fi

  security-gate:
    runs-on: ubuntu-latest
    needs: [security, lint, test]
    steps:
      - name: Check security status
        run: |
          if [ "${{ needs.security.result }}" != "success" ]; then
            echo "❌ Critical vulnerabilities found!"
            exit 1
          fi
          echo "✅ Security checks passed!"

  docker:
    runs-on: ubuntu-latest
    needs: security-gate
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: igor-maicovich
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx builder
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver: docker-container

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/igor-maicovich/smart-cart:latest
          cache-from: type=registry,ref=ghcr.io/igor-maicovich/smart-cart:cache
          cache-to: type=registry,ref=ghcr.io/igor-maicovich/smart-cart:cache,mode=max

  notify:
    runs-on: ubuntu-latest
    needs: [docker]
    if: always()
    steps:
      - name: Send Telegram Notification
        run: |
          STATUS="✅ All checks passed"
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            STATUS="❌ CI failed"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="CI Pipeline: ${STATUS}"