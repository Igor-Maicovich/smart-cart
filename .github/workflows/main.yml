name: CI Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Install dependencies
        run: go mod tidy

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Install pre-commit
        run: python3 -m pip install --upgrade pip pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      - name: Run golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s latest
          ./bin/golangci-lint run ./...

      - name: Run unit tests
        run: go test ./... -v

      - name: Security scan (gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

      - name: Send Telegram Notification
        if: always()
        run: |
          STATUS="✅ All checks passed"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS="❌ CI failed"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="CI Pipeline: ${STATUS}"
            
      - name: Login to GHCR
        if: github.event_name == 'push'
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u igor-maicovich --password-stdin

      - name: Build Docker image
        if: github.event_name == 'push'
        run: docker build -t ghcr.io/igor-maicovich/smart-cart:latest .

      - name: Push Docker image (with log)
        if: github.event_name == 'push'
        run: |
          docker push ghcr.io/igor-maicovich/smart-cart:latest | tee registry_push_log.txt

      - name: Upload log artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: push-log
          path: registry_push_log.txt
          if-no-files-found: error