name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Clear Go build cache
        run: rm -rf ~/.cache/go-build

      - name: Cache Go build
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Install Go dependencies
        run: go mod tidy

      - name: Install goimports (system)
        run: go install golang.org/x/tools/cmd/goimports@latest

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install pre-commit
        run: python3 -m pip install --upgrade pip pre-commit
      - name: Run pre-commit hooks
        run: pre-commit run --all-files
      - name: Run golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s latest
          ./bin/golangci-lint run ./...

  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Generate dev TLS certs
        run: |
          mkdir -p certs
          rm -f certs/server-dev.crt certs/server-dev.key
          openssl req -x509 -newkey rsa:4096 -keyout certs/server-dev.key -out certs/server-dev.crt -days 1 -nodes -subj "/CN=localhost"
      - name: Run unit tests
        run: go test ./... -v

  security-gosec:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run gosec (SAST)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

  security-semgrep:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep scan
        run: semgrep --config auto ./internal

  security-sca:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run govulncheck (SCA)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./internal/...

  security-gate:
    runs-on: ubuntu-latest
    needs: [security-gosec, security-semgrep, security-sca]
    steps:
      - name: Check security status
        run: |
          if [ "${{ needs.security-gosec.result }}" = "failure" ] || \
             [ "${{ needs.security-semgrep.result }}" = "failure" ] || \
             [ "${{ needs.security-sca.result }}" = "failure" ]; then
            echo "❌ Critical vulnerabilities found!"
            exit 1
          fi
          echo "✅ Security checks passed!"

  docker:
    runs-on: ubuntu-latest
    needs: security-gate
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u igor-maicovich --password-stdin
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          push: false
          cache-from: type=registry,ref=ghcr.io/igor-maicovich/smart-cart:cache
          cache-to: type=registry,ref=ghcr.io/igor-maicovich/smart-cart:cache,mode=max
          tags: ghcr.io/igor-maicovich/smart-cart:latest
      - name: Push Docker image (with log)
        run: docker push ghcr.io/igor-maicovich/smart-cart:latest | tee registry_push_log.txt
      - name: Upload log artifact
        uses: actions/upload-artifact@v4
        with:
          name: push-log
          path: registry_push_log.txt
          if-no-files-found: error

  notify:
    runs-on: ubuntu-latest
    needs: [docker]
    if: always()
    steps:
      - name: Send Telegram Notification
        run: |
          STATUS="✅ All checks passed"
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            STATUS="❌ CI failed"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="CI Pipeline: ${STATUS}"