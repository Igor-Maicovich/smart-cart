title = "Gitleaks custom rules"

[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "secret"]

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(api[_-]?key|apikey)["\s:=]+["']?[A-Za-z0-9]{20,}["']?'''
tags = ["generic", "secret"]

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'''
tags = ["crypto", "secret"]

[[rules]]
id = "password-in-code"
description = "Hardcoded password"
regex = '''(?i)(password|passwd|pwd)\s*=\s*["'][^"']{4,}["']'''
tags = ["password", "secret"]

[[rules]]
id = "email-password"
description = "Email with password"
regex = '''(?i)(email|login)["\s:=]+["']?[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}["']?.{0,20}(password|pwd)["\s:=]+["'][^"']+["']'''
tags = ["credentials", "leak"]

[[rules]]
id = "token-in-url"
description = "Token in URL"
regex = '''https?:\/\/[^\/\s]+:[^@\s]+@[^\/\s]+'''
tags = ["url", "credentials"]

[[rules]]
id = "github-token"
description = "GitHub Token"
regex = '''ghp_[A-Za-z0-9]{36}'''
tags = ["github", "token", "secret"]

[[rules]]
id = "jwt-token"
description = "JWT Token"
regex = '''eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9._-]+\.[A-Za-z0-9._-]+'''
tags = ["jwt", "token", "auth"]